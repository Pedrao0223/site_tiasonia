<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>bordados_sonia</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>
            <img class="logo" src="imagens_tiasonia/logo-tia-sonia.png" alt="" width="150px">
            <ul>
                <li><a class="icones" href="#"><i class="fa-solid fa-house"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-pen-ruler"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-user"></i></a></li>
            </ul>
        </nav>
    </header>

    <main>

        <article class="area_banner">

            <section id="banner">
                <img src="imagens_tiasonia/banner 2.png" alt="banner bordados da tia sonia"
                    id="banner__image">
                </section>
            <section id="reservas">
                <h2 id="reservas__titulo">Vagas na agenda da semana: 3 disponiveis</h2>
                <button id="reservas__botao">resevar
                    vaga</button>
            </section>

        </article> 

        <article class="area_sobre">
            <section class="Sobre"> 

                <h1 class="Sobre_Titulo">Conheca a tia sonia </h1> 

                <p class="Sobre_texto">A tia sonia estar super feliz em ter voce por aqui, ela borda 
                    todos os dias e ama o que faz, se voce gosta de bordados como ela
                    , ou conhece alguem que amaria recebar um bordado, visite o seu catalogo e 
                    faca sua reserva 
                </p>

            </section>

            <section class="Sobre"> 

                <img class="sobre_foto" src="imagens_tiasonia/tia-sonia.png" alt="imagem tia sonia">

            </section>


        </article>





    </main>









    
</body>
</html>
