<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>area-login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="cadastro.css">
    <link rel="shortcut icon" href="imagens_tiasonia/icone_site.png" type="image/x-icon">
</head>

<body> 
     <header>
        <nav class="area_navegacao">
            <img class="logo" src="imagens_tiasonia/logo-tia-sonia.png" alt="" width="150px">
            <ul>
                <li><a class="icones" href="index.html"><i class="fa-solid fa-house"></i></a></li>
                <li><a class="icones" href="#bordados"><i class="fa-solid fa-pen-ruler"></i></a></li>
                <li><a class="icones" href="#"><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li><a class="icones" href="#cadastro.html"><i class="fa-solid fa-user"></i></a></li>
            </ul>
        </nav>
    </header>

    <main class="area-cadastro">

        <section class="area_titulo">
            <h1>Cadastre-se</h1>
        </section>

        <section class="area-formulario">
            <form action="#" class="form_cadastro">

                <div class="area-nome formatacao">
                    <div class="priemeiro-nome titulo-campo">
                        <label for="Nome">Nome</label>
                        <input type="text" id="nome" placeholder="Digite seu nome" required>
                    </div>



                    <div class="ultimo-nome titulo-campo">
                        <label for="sobrenome">sobrenome</label>
                        <input type="text" id="sobrenome" placeholder="Digite seu sobrenome">

                    </div>
                </div>


                <div class="area-acesso formatacao">
                    <div class="email titulo-campo">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Digite seu email" required>
                    </div>


                    <div class="senha titulo-campo">
                        <label for="Senha">Senha</label>
                        <input type="password" id="Senha" placeholder="ooooooo" required>
                    </div>
                </div>
                <div class="area-contato formatacao">
                    <div class="DDD titulo-campo">
                        <label for="DDD">DDD</label>
                        <input type="number" max="99" id="DDD" placeholder="DDD" required>
                    </div>
                    <div class="telefone titulo-campo">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" placeholder="Digite seu telefone" required>
                    </div>
                </div>
                <div class="area-endereco">
                    <div class="endereco-numero formatacao">
                        <div class="endereco titulo-campo">
                            <label for="endereco">endereco</label>
                            <input type="text" id="endereco" placeholder="Degite seu endereco" required>
                        </div>

                        <div class="numero titulo-campo">
                            <label for="numero">numero</label>
                            <input type="number" max="99" id="numero" placeholder="Digite seu numero" required>
                        </div>
                    </div>

                    <div class="cidade-cep formatacao">
                        <div class="cidade titulo-campo">
                            <label for="cidade">cidade</label>
                            <input type="text" id="cidade" placeholder="cidade">
                        </div>

                        <div class="cep titulo-campo">
                            <label for="cep">cep</label>
                            <input type="text" id="cep" placeholder="0000000">
                        </div>

                    </div>

                </div>

                <div class="area-dados formatacao">
                    <div class="data-nascimento titulo-campo">
                        <label for="data_de_nascimento">data_de_nascimento</label>
                        <input type="date" id="data_de_nascimento" required>
                    </div>

                    <div class="genero titulo-campo">
                        <label for="genero">genero</label>
                        <select id="genero">
                            <option value="#" disabled selected>Selecione seu genero</option>
                            <option value="#">Feminino</option>
                            <option value="#">Masculino</option>
                            <option value="#">Outro</option>
                            <option value="#">Prefiro nao responder</option>
                        </select>
                    </div>

                </div>





                <div class="area-botao">
                    <button type="submit" id="botao_cadastrar">cadastrar</button>
                    <a href="#" class="link-login"> Ja possui uma conta ? Acesse agora !</a>
                </div>







            </form>
        </section>






    </main>

</body>

</html>
