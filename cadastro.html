<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="cadastro.css">
</head>

<body>
    <main class="area-cadastro">

        <section class="area_titulo">
            <h1>Cadastre-se</h1>
        </section>

        <section class="area-formulario">
            <form action="#" class="form_cadastro">

                <div class="area-nome">
                    <div class="priemeiro-nome">
                        <label for="Nome">Nome</label>
                        <input type="text" id="nome" placeholder="Digite seu nome" required>
                    </div>



                    <div class="ultimo-nome">
                        <label for="sobrenome">sobrenome</label>
                        <input type="text" id="sobrenome" placeholder="Digite seu sobrenome">

                    </div>
                </div>


                <div class="area-acesso">
                    <div class="email">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Digite seu email" required>
                    </div>


                    <div class="senha">
                        <label for="Senha">Senha</label>
                        <input type="password" id="Senha" placeholder="ooooooo" required>
                    </div>
                </div>
                <div class="area-contato">
                    <div class="DDD">
                        <label for="DDD">DDD</label>
                        <input type="number" max="99" id="DDD" placeholder="DDD" required>
                    </div>
                    <div class="telefone">
                        <label for="Telefone">Telefone</label>
                        <input type="text" id="Telefone" placeholder="Digite seu telefone" required>
                    </div>
                </div>
                <div class="area-endereco">
                    <div class="endereco">
                        <label for="Endereco">Endereco</label>
                        <input type="text" id="Endereco" placeholder="Degite seu endereco" required>
                    </div>

                    <div class="numero">
                        <label for="Numero">Numero</label>
                        <input type="number" max="99" id="Numero" placeholder="Digite seu numero" required>
                    </div>

                    <div class="cidade">
                        <label for="cidade">cidade</label>
                        <input type="text" id="cidade" placeholder="cidade">
                    </div>

                    <div class="cep">
                        <label for="cep">cep</label>
                        <input type="text" id="cep" placeholder="0000000">
                    </div>

                </div>

                <div class="area-dados">
                    <div class="data-nascimento">
                        <label for="data_de_nascimento">data_de_nascimento</label>
                        <input type="date" id="data_de_nascimento" required>
                    </div>

                    <div class="genero">
                        <label for="genero">genero</label>
                        <select id="genero">
                            <option value="#" disabled selected>Selecione seu genero</option>
                            <option value="#">Feminino</option>
                            <option value="#">Masculino</option>
                            <option value="#">Outro</option>
                            <option value="#">Prefiro nao responder</option>
                        </select>
                    </div>

                </div>





                <div class="area-botao">
                    <button type="submit" id="botao_cadastrar">cadastrar</button>
                    <a href="#" class="link-login"> Ja possui uma conta ? Acesse agora !</a>
                </div>




                


            </form>
        </section>






    </main>

</body>

</html>
