<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>area de login</title>
    <link rel="shortcut icon" href="imagens_tiasonia/icone_site.png" type="image/x-icon">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <header class="cabecalho">
        <h1 class="titulo">Seja bem vindo ao site da tia sonia ! 👵</h1>
    </header>

    



    <main class="campo-login"> 
        <h1 class="texto">AREA DE LOGIN</h1>
        <div class="area-de-login">
            <div class="area-email">
                <label for="email">Email</label>
                <input type="email" id="email"  placeholder="digite seu email">  
            </div>
            <div class="area-senha">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="digite sua senha">
            </div>
        </div>
                <div class="area-botao">
                    <button class="botao-login" type="submit" id="botao_cadastrar">login</button>
                    <a href="#" class="link-login">Esqueceu sua senha</a>
                    <a href="cadastro.html" class="link-login"> Nao tem conta ? Cadastra-se !</a>
                </div>
                
        </main> 

        <footer class="rodape">
        <nav>
            <p class="texto_rodape"><strong>A tia sônia agradece a visita. Ficou alguma dúvida entre em contato com
                    ela.®</strong></p>








</body>

</html>
